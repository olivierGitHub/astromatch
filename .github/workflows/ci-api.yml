name: CI API

on:
  push:
    paths:
      - 'astromatch-api/**'
      - '.github/workflows/ci-api.yml'
  pull_request:
    paths:
      - 'astromatch-api/**'
      - '.github/workflows/ci-api.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astromatch-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Test and package
        run: ./mvnw -B verify
