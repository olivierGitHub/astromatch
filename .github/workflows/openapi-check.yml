name: OpenAPI check

on:
  push:
    paths:
      - 'api-contract/**'
      - '.github/workflows/openapi-check.yml'
  pull_request:
    paths:
      - 'api-contract/**'
      - '.github/workflows/openapi-check.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Parse OpenAPI YAML
        run: |
          pip install pyyaml
          python -c "import yaml; yaml.safe_load(open('api-contract/openapi.yaml')); print('openapi.yaml OK')"
