name: CI Mobile

on:
  push:
    paths:
      - 'astromatch-mobile/**'
      - '.github/workflows/ci-mobile.yml'
  pull_request:
    paths:
      - 'astromatch-mobile/**'
      - '.github/workflows/ci-mobile.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astromatch-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: astromatch-mobile/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run lint
