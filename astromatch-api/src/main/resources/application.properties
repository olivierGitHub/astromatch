spring.application.name=astromatch-api

# Local bootstrap without PostgreSQL (Story 1.1). Override with JDBC URL to Postgres for integrated environments.
spring.datasource.url=jdbc:h2:file:./var/astromatch-db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true

# Identity policy (Story 1.5)
astromatch.identity.minimum-age-years=18

# JWT (Story 1.3) — override ASTROMATCH_JWT_SECRET in deployed environments
astromatch.jwt.secret=${ASTROMATCH_JWT_SECRET:dev-only-change-me-use-at-least-256-bits-for-hs256-astromatch-astromatch}
astromatch.jwt.access-token-minutes=15
astromatch.jwt.refresh-token-days=30

# Password recovery (Story 1.4) — never expose reset token in production
astromatch.recovery.expose-reset-token=false
astromatch.recovery.forgot-password-cooldown-seconds=60
astromatch.recovery.reset-token-minutes=60

astromatch.upload.dir=./var/astromatch-uploads
astromatch.upload.max-photo-bytes=5242880

astromatch.rate-limit.login-per-minute-per-ip=60
astromatch.rate-limit.register-per-minute-per-ip=30
astromatch.rate-limit.recovery-per-minute-per-ip=20
astromatch.rate-limit.other-auth-per-minute-per-ip=120

# Feed / swipes (Epic 2) — entitlements stub until Epic 5
astromatch.feed.daily-like-cap=50
astromatch.feed.daily-super-like-cap=3
astromatch.feed.swipe-burst-per-minute-per-user=60

# Push (Epic 3) — Expo Push API; disable locally if needed
astromatch.push.enabled=true

# Billing / entitlements (Epic 5) — stub validation for dev; production must disable stub and wire store APIs
astromatch.billing.stub-validation-enabled=true
astromatch.billing.product-swipe-pack=com.astromatch.swipe_pack
astromatch.billing.product-alignment-boost=com.astromatch.alignment_boost
astromatch.billing.product-location-pass=com.astromatch.location_pass
astromatch.billing.swipe-pack-bonus-likes=5
astromatch.billing.boost-duration-hours=24
astromatch.billing.location-pass-duration-hours=24

# Safety & moderation (Epic 6)
astromatch.safety.report-max-per-hour-per-user=10
astromatch.safety.block-max-per-day-per-user=50
astromatch.operator.api-key=${ASTROMATCH_OPERATOR_API_KEY:dev-only-operator-key-change-in-production}

spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=7MB

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when_authorized
